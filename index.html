<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>點名小幫手</title>
  <link rel="stylesheet" href="main.css">
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      display: flex;
      touch-action: none;
    }
    #app { display: none; flex: 1; }
    body.unlocked #app { display: flex; }
    .grid {
      flex: 1;
      display: grid;
      gap: 4px;
      padding: 4px;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(6, 1fr);
    }
    @media (orientation: landscape) {
      .grid {
        grid-template-columns: repeat(6, 1fr);
        grid-template-rows: repeat(4, 1fr);
      }
    }
    @media (min-width: 768px) {
      .grid {
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(5, 1fr);
      }
    }
    .cell {
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      cursor: pointer;
      padding: 4px;
      text-align: center;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }
    .cell.on { background: #c8e6c9; border-color: #4caf50; }
    .cell .name { font-weight: 500; margin-bottom: 4px; word-break: break-word; font-size: 1.3rem; }
    .cell .status { color: #888; font-weight: 600; letter-spacing: .5px; font-size: 1rem; }
    @media (min-width: 768px) {
      .cell .name { font-size: 1.5rem; }
      .cell .status { font-size: 1.2rem; }
    }
    .cell.on .status { color: #2e7d32; }
    .cell.empty {
      border: 1px dashed #e0e0e0;
      background: transparent;
      pointer-events: none;
    }
    #qq { position: fixed; bottom: 0; right: 0; }
  </style>
</head>

<body>
  <div id="app"><div class="grid" id="grid"></div></div>
  <div id="qq">v26.5.21</div>
  <script>
    const SECRET = '#9527';

    function render() {
      const unlocked = location.hash === SECRET;
      document.body.classList.toggle('unlocked', unlocked);
      if (unlocked) buildGrid();
    }

    const names = ["順利", "宗佑", "書聿", "宸賓", "政儒", "宥呈", "慈憶", "庚翰", "股中", "Leo", "玉莉", "敬耀", "翊誠", "俞萱", "柏亦", "長緯", "倫紳", "珮綺", "冀昕", "怡秀", "堯堯", "季橫", "維忠"];
    const states = new Array(names.length).fill(false);
    const grid = document.getElementById('grid');

    function cellCount() {
      if (window.matchMedia('(min-width: 768px)').matches) return 25;
      return 24;
    }

    function buildGrid() {
      const total = cellCount();
      if (grid.childElementCount === total) return;
      grid.innerHTML = '';
      for (let i = 0; i < total; i++) {
        const cell = document.createElement('div');
        if (i < names.length) {
          const on = states[i];
          cell.className = 'cell' + (on ? ' on' : '');
          cell.dataset.on = on ? 'true' : 'false';
          cell.dataset.idx = i;
          cell.innerHTML = `<div class="name">${names[i]}</div><div class="status">${on ? 'ON' : 'OFF'}</div>`;
        } else {
          cell.className = 'cell empty';
        }
        grid.appendChild(cell);
      }
    }

    window.addEventListener('resize', () => {
      if (document.body.classList.contains('unlocked')) buildGrid();
    });

    let dragging = false;
    let targetState = null;
    const path = [];
    const originals = new Map();
    let lastCell = null;

    function setCell(cell, on) {
      if (!cell || cell.classList.contains('empty')) return;
      cell.dataset.on = on ? 'true' : 'false';
      cell.classList.toggle('on', on);
      cell.querySelector('.status').textContent = on ? 'ON' : 'OFF';
      const idx = Number(cell.dataset.idx);
      if (!Number.isNaN(idx)) states[idx] = !!on;
    }

    function cellAt(x, y) {
      const el = document.elementFromPoint(x, y);
      if (!el) return null;
      const c = el.closest('.cell');
      if (!c || c.classList.contains('empty')) return null;
      return c;
    }

    function enterCell(c) {
      if (c === lastCell) return;
      const idx = path.indexOf(c);
      if (idx >= 0) {
        for (let i = path.length - 1; i >= idx; i--) {
          const cell = path[i];
          setCell(cell, originals.get(cell));
          originals.delete(cell);
        }
        path.length = idx;
      } else {
        originals.set(c, c.dataset.on === 'true');
        setCell(c, targetState);
        path.push(c);
      }
      lastCell = c;
    }

    function onStart(x, y) {
      const c = cellAt(x, y);
      if (!c) return;
      dragging = true;
      targetState = c.dataset.on !== 'true';
      path.length = 0;
      originals.clear();
      lastCell = null;
      enterCell(c);
    }

    function onMove(x, y) {
      if (!dragging) return;
      const c = cellAt(x, y);
      if (!c) return;
      enterCell(c);
    }

    function onEnd() {
      dragging = false;
      targetState = null;
      path.length = 0;
      originals.clear();
      lastCell = null;
    }

    grid.addEventListener('pointerdown', e => { e.preventDefault(); onStart(e.clientX, e.clientY); });
    document.addEventListener('pointermove', e => { if (dragging) onMove(e.clientX, e.clientY); });
    document.addEventListener('pointerup', onEnd);
    document.addEventListener('pointercancel', onEnd);

    window.addEventListener('hashchange', render);
    render();
  </script>
</body>

</html>
